<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spende für einen Hund</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #fff; font-family: sans-serif; cursor: crosshair; }

    #money-box {
      position: fixed;
      top: 16px;
      right: 16px;
      background: white;
      border: 2px solid #333;
      padding: 10px 16px;
      border-radius: 8px;
      z-index: 10;
      min-width: 140px;
      text-align: center;
      pointer-events: all;
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.15s;
      user-select: none;
    }
    #money-box:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.18); transform: scale(1.04); }
    #money-box h3 { font-size: 13px; margin-bottom: 4px; }
    #money-box #amount { font-size: 22px; font-weight: bold; }
    #money-box .click-hint { font-size: 10px; color: #999; margin-top: 4px; }

    /* Twint Modal */
    #twint-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #twint-overlay.open { display: flex; }

    #twint-modal {
      background: white;
      border-radius: 16px;
      padding: 28px 32px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
      position: relative;
    }
    #twint-modal .twint-logo {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -1px;
      color: #000;
      margin-bottom: 6px;
    }
    #twint-modal .twint-logo span { color: #e30613; }
    #twint-modal h2 { font-size: 16px; color: #444; margin-bottom: 20px; font-weight: 400; }
    #twint-modal .modal-amount {
      font-size: 42px;
      font-weight: 800;
      color: #111;
      margin-bottom: 8px;
      line-height: 1;
    }
    #twint-modal .modal-phone-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    #twint-modal .modal-phone {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 1px;
      color: #111;
      background: #f5f5f5;
      border-radius: 8px;
      padding: 8px 14px;
      display: inline-block;
      margin-bottom: 22px;
    }
    #twint-modal .modal-steps {
      font-size: 12px;
      color: #666;
      text-align: left;
      background: #fafafa;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 20px;
      line-height: 1.8;
    }
    #twint-modal .btn-twint {
      display: block;
      width: 100%;
      background: #000;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }
    #twint-modal .btn-twint:hover { background: #222; }
    #twint-modal .btn-close {
      background: none;
      border: none;
      color: #aaa;
      font-size: 13px;
      cursor: pointer;
      padding: 4px;
    }
    #twint-modal .btn-close:hover { color: #555; }
    #twint-modal .close-x {
      position: absolute;
      top: 14px; right: 18px;
      font-size: 20px;
      cursor: pointer;
      color: #bbb;
      line-height: 1;
    }
    #twint-modal .close-x:hover { color: #555; }

    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 14px;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    canvas { display: block; }
  </style>
</head>
<body>

<div id="money-box" onclick="openTwint()">
  <h3>Gesammelt 🐾</h3>
  <div id="amount">0.00 €</div>
  <div class="click-hint">Klicken zum Spenden via Twint</div>
</div>

<!-- Twint Modal -->
<div id="twint-overlay" onclick="closeTwintIfOutside(event)">
  <div id="twint-modal">
    <span class="close-x" onclick="closeTwint()">×</span>
    <div class="twint-logo">TW<span>I</span>NT</div>
    <h2>Spende direkt via Twint</h2>
    <div class="modal-amount" id="modal-amount">0.00 CHF</div>
    <div class="modal-phone-label">An Telefonnummer</div>
    <div class="modal-phone">+41 76 294 16 83</div>
    <div class="modal-steps">
      1. Klick auf "Twint öffnen"<br>
      2. Tippe auf <strong>Senden</strong><br>
      3. Gib die Nummer ein: <strong>076 294 16 83</strong><br>
      4. Betrag <strong id="steps-amount">0.00</strong> CHF eingeben &amp; bestätigen
    </div>
    <button class="btn-twint" onclick="launchTwint()">Twint öffnen</button>
    <button class="btn-close" onclick="closeTwint()">Abbrechen</button>
  </div>
</div>

<div id="hint">Klicken & ziehen um den Ball zu werfen!</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const amountEl = document.getElementById('amount');
const hint = document.getElementById('hint');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ---- Constants ----
const MAX_DRAG = 180;       // px max pull
const POWER_SCALE = 3.5;    // multiplier: drag distance → throw distance
const MONEY_PER_100PX = 0.01;

// ---- State ----
let money = 0;
let totalDistanceRun = 0;

const DOG_HOME = () => ({ x: 100, y: canvas.height / 2 });

const dog = {
  x: 100, y: 0,
  size: 30,
  speed: 240,
  state: 'idle', // idle | running | fetching | returning
  targetX: 0, targetY: 0,
  hasBall: false,
  facingLeft: false,
};

// Ball can fly through the air before landing
const ball = {
  x: 0, y: 0,
  radius: 10,
  visible: false,
  // flight
  flying: false,
  startX: 0, startY: 0,
  landX: 0, landY: 0,
  flightT: 0,      // 0..1
  flightDur: 0,    // seconds
  arcHeight: 0,
};

// Drag / aim state
const drag = {
  active: false,
  startX: 0, startY: 0,
  curX: 0, curY: 0,
};

let lastTime = null;

// Initialise dog position after resize
function resetDog() {
  const h = DOG_HOME();
  dog.x = h.x; dog.y = h.y;
}
resetDog();
window.addEventListener('resize', resetDog);

// ---- Input ----
canvas.addEventListener('mousedown', (e) => {
  if (dog.state !== 'idle' || ball.flying) return;
  drag.active = true;
  drag.startX = e.clientX;
  drag.startY = e.clientY;
  drag.curX = e.clientX;
  drag.curY = e.clientY;
  hint.style.opacity = '0';
});

canvas.addEventListener('mousemove', (e) => {
  if (!drag.active) return;
  drag.curX = e.clientX;
  drag.curY = e.clientY;
});

canvas.addEventListener('mouseup', (e) => {
  if (!drag.active) return;
  drag.active = false;

  const dx = drag.curX - drag.startX;
  const dy = drag.curY - drag.startY;
  const rawDist = Math.sqrt(dx * dx + dy * dy);
  if (rawDist < 8) return; // too short, ignore

  const clampedDist = Math.min(rawDist, MAX_DRAG);
  const power = clampedDist * POWER_SCALE;

  // Throw direction = OPPOSITE of drag direction (slingshot feel)
  const nx = -dx / rawDist;
  const ny = -dy / rawDist;

  // Ball launches from drag start point
  const launchX = drag.startX;
  const launchY = drag.startY;
  const landX = launchX + nx * power;
  const landY = launchY + ny * power;

  // Arc height proportional to power
  const arcH = power * 0.35;
  const flightDur = power / 600; // seconds

  ball.startX = launchX;
  ball.startY = launchY;
  ball.x = launchX;
  ball.y = launchY;
  ball.landX = Math.max(10, Math.min(canvas.width - 10, landX));
  ball.landY = Math.max(10, Math.min(canvas.height - 10, landY));
  ball.arcHeight = arcH;
  ball.flightDur = flightDur;
  ball.flightT = 0;
  ball.flying = true;
  ball.visible = true;

  // Dog faces throw direction while waiting
  dog.facingLeft = nx < 0;
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY }));
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY }));
}, { passive: false });
canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  const t = e.changedTouches[0];
  canvas.dispatchEvent(new MouseEvent('mouseup', { clientX: t.clientX, clientY: t.clientY }));
}, { passive: false });

// ---- Update ----
function update(dt) {
  // Ball in flight
  if (ball.flying) {
    ball.flightT += dt / ball.flightDur;
    if (ball.flightT >= 1) {
      ball.flightT = 1;
      ball.flying = false;
      ball.x = ball.landX;
      ball.y = ball.landY;
      // Send dog
      dog.state = 'running';
      dog.targetX = ball.landX;
      dog.targetY = ball.landY;
    } else {
      const t = ball.flightT;
      ball.x = ball.startX + (ball.landX - ball.startX) * t;
      ball.y = ball.startY + (ball.landY - ball.startY) * t
               - ball.arcHeight * 4 * t * (1 - t); // parabolic arc
    }
    return;
  }

  if (dog.state === 'running' || dog.state === 'returning') {
    const dx = dog.targetX - dog.x;
    const dy = dog.targetY - dog.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const step = dog.speed * dt;
    dog.facingLeft = dx < 0;

    if (dist <= step) {
      totalDistanceRun += dist;
      dog.x = dog.targetX;
      dog.y = dog.targetY;

      if (dog.state === 'running') {
        dog.hasBall = true;
        ball.visible = false;
        dog.state = 'fetching';
        setTimeout(() => {
          const h = DOG_HOME();
          dog.state = 'returning';
          dog.targetX = h.x;
          dog.targetY = h.y;
        }, 250);
      } else {
        dog.state = 'idle';
        dog.hasBall = false;
      }
    } else {
      totalDistanceRun += step;
      dog.x += (dx / dist) * step;
      dog.y += (dy / dist) * step;
    }

    money = totalDistanceRun / 100 * MONEY_PER_100PX * 100;
    amountEl.textContent = money.toFixed(2) + ' €';
  }
}

// ---- Draw helpers ----
function drawMeadow() {
  ctx.fillStyle = '#d4edda';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#a8d5b5';
  for (let i = 0; i < 60; i++) {
    const x = (i * 173 + 41) % canvas.width;
    const y = (i * 97 + 123) % canvas.height;
    ctx.beginPath();
    ctx.ellipse(x, y, 8, 3, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawAimIndicator() {
  if (!drag.active) return;

  const ox = drag.startX;
  const oy = drag.startY;
  const dx = drag.curX - ox;
  const dy = drag.curY - oy;
  const rawDist = Math.sqrt(dx * dx + dy * dy);
  if (rawDist < 4) return;

  const clamp = Math.min(rawDist, MAX_DRAG);
  const power = clamp * POWER_SCALE;
  const nx = -dx / rawDist;
  const ny = -dy / rawDist;

  // Dotted trajectory preview
  const steps = 14;
  const arcH = power * 0.35;
  ctx.save();
  for (let i = 1; i <= steps; i++) {
    const t = i / steps;
    const px = ox + nx * power * t;
    const py = oy + ny * power * t - arcH * 4 * t * (1 - t);
    const alpha = 1 - t * 0.7;
    const r = 5 * (1 - t * 0.5);
    ctx.fillStyle = `rgba(231, 76, 60, ${alpha})`;
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Pull line from drag start back to cursor
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(ox, oy);
  // show clamped pull handle
  const handleX = ox + (dx / rawDist) * clamp;
  const handleY = oy + (dy / rawDist) * clamp;
  ctx.lineTo(handleX, handleY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Power circle at origin
  const pct = clamp / MAX_DRAG;
  ctx.strokeStyle = pct > 0.6 ? '#e74c3c' : pct > 0.3 ? '#f39c12' : '#27ae60';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(ox, oy, 18, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * pct);
  ctx.stroke();

  // Handle dot
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.arc(handleX, handleY, 8, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawBall() {
  if (!ball.visible) return;
  ctx.save();

  // Shadow on ground when flying
  if (ball.flying) {
    const shadowX = ball.startX + (ball.landX - ball.startX) * ball.flightT;
    const shadowY = ball.landY;
    const scale = 0.3 + 0.7 * ball.flightT;
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(shadowX, shadowY, ball.radius * scale, ball.radius * 0.3 * scale, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#c0392b';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();
}

function drawDog() {
  ctx.save();
  ctx.translate(dog.x, dog.y);
  if (dog.facingLeft) ctx.scale(-1, 1);

  const s = dog.size;
  const now = Date.now();
  const moving = dog.state === 'running' || dog.state === 'returning';

  // body
  ctx.fillStyle = '#c8a06e';
  ctx.beginPath();
  ctx.ellipse(0, 0, s * 0.8, s * 0.45, 0, 0, Math.PI * 2);
  ctx.fill();

  // head
  ctx.beginPath();
  ctx.arc(s * 0.7, -s * 0.2, s * 0.38, 0, Math.PI * 2);
  ctx.fill();

  // ear
  ctx.fillStyle = '#a0784e';
  ctx.beginPath();
  ctx.ellipse(s * 0.75, -s * 0.4, s * 0.12, s * 0.22, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // snout
  ctx.fillStyle = '#d4a876';
  ctx.beginPath();
  ctx.ellipse(s * 1.0, -s * 0.15, s * 0.22, s * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();

  // nose
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(s * 1.12, -s * 0.17, s * 0.07, 0, Math.PI * 2);
  ctx.fill();

  // eye
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(s * 0.85, -s * 0.3, s * 0.06, 0, Math.PI * 2);
  ctx.fill();

  // tail
  ctx.strokeStyle = '#a0784e';
  ctx.lineWidth = s * 0.15;
  ctx.lineCap = 'round';
  ctx.beginPath();
  const wag = moving ? Math.sin(now / 80) * 0.4 : Math.sin(now / 200) * 0.15;
  ctx.moveTo(-s * 0.7, -s * 0.1);
  ctx.quadraticCurveTo(-s * 1.0, -s * 0.5 + wag * s, -s * 0.9, -s * 0.7 + wag * s);
  ctx.stroke();

  // legs
  const legSwing = moving ? Math.sin(now / 100) * 10 : 0;
  ctx.strokeStyle = '#c8a06e';
  ctx.lineWidth = s * 0.18;
  ctx.lineCap = 'round';

  [{ bx: s * 0.3, sign: 1 }, { bx: s * 0.1, sign: -1 }].forEach(({ bx, sign }) => {
    ctx.beginPath();
    ctx.moveTo(bx, s * 0.35);
    ctx.lineTo(bx + sign * legSwing, s * 0.75);
    ctx.stroke();
  });
  [{ bx: -s * 0.4, sign: -1 }, { bx: -s * 0.6, sign: 1 }].forEach(({ bx, sign }) => {
    ctx.beginPath();
    ctx.moveTo(bx, s * 0.35);
    ctx.lineTo(bx + sign * legSwing, s * 0.75);
    ctx.stroke();
  });

  // ball in mouth
  if (dog.hasBall) {
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.arc(s * 1.15, -s * 0.1, s * 0.18, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

// ---- Loop ----
function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 1000, 0.1);
  lastTime = ts;

  update(dt);

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawMeadow();
  drawAimIndicator();
  drawBall();
  drawDog();

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

// ---- Twint ----
const TWINT_PHONE = '+41762941683';

function openTwint() {
  const amt = money.toFixed(2);
  document.getElementById('modal-amount').textContent = amt + ' CHF';
  document.getElementById('steps-amount').textContent = amt;
  document.getElementById('twint-overlay').classList.add('open');
}

function closeTwint() {
  document.getElementById('twint-overlay').classList.remove('open');
}

function closeTwintIfOutside(e) {
  if (e.target === document.getElementById('twint-overlay')) closeTwint();
}

function launchTwint() {
  // Try Twint deep link — opens the Twint app if installed
  window.location.href = 'twint://';
  // Fallback: after short delay open App Store / Play Store if Twint didn't open
  setTimeout(() => {
    // iOS App Store
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    if (isIOS) {
      window.open('https://apps.apple.com/ch/app/twint/id976604875', '_blank');
    } else {
      window.open('https://play.google.com/store/apps/details?id=ch.twint.payment', '_blank');
    }
  }, 1800);
}
</script>
</body>
</html>
